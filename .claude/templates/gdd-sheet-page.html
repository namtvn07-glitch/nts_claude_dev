<!DOCTYPE html>
<!--
  TRG36 GDD Sheet — generated page (self-contained, GitHub Pages ready).
  Do NOT edit by hand. Source of truth: design/gdd/gdd-sheet/gdd-sheet.md
  Regenerate via slash command: /publish-gdd
  Markers replaced at generation time: GDD_TITLE, GDD_GENERATED_AT, GDD_MARKDOWN (mỗi cái dạng HTML comment).
-->
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title><!--GDD_TITLE--></title>
  <style>
    :root {
      --bg: #f3f7f9; --panel: #ffffff; --fg: #1f2730; --muted: #5b6b78;
      --border: #dde5eb; --zebra: #f7fafb; --th-bg: #eef4f7;
      --accent: #0e9aa7; --accent-2: #1d7dd9; --accent-soft: #d8f0f1;
      --code-bg: #eef2f5; --shadow: 0 1px 3px rgba(20,40,60,.08), 0 10px 30px rgba(20,40,60,.07);
      --hero-1: #0e9aa7; --hero-2: #1d7dd9; --hero-3: #16c5c0;
      --hit: #ffd86b; --hit-cur: #ff9f43; --topbar-h: 56px;
    }
    html[data-theme="dark"] {
      --bg: #0d1117; --panel: #161b22; --fg: #e6edf3; --muted: #9aa6b2;
      --border: #2a3139; --zebra: #1a2027; --th-bg: #1d242c;
      --accent: #2dd4bf; --accent-2: #58a6ff; --accent-soft: #15343a;
      --code-bg: #1c232b; --shadow: 0 1px 3px rgba(0,0,0,.4), 0 10px 30px rgba(0,0,0,.35);
      --hero-1: #0b5d63; --hero-2: #14538f; --hero-3: #0e7d79;
      --hit: #8a6d1f; --hit-cur: #b5701d;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; background: var(--bg); color: var(--fg); line-height: 1.65;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased; }

    /* ---- top bar ---- */
    .topbar { position: sticky; top: 0; z-index: 60; height: var(--topbar-h);
      display: flex; align-items: center; gap: 10px; padding: 0 16px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2)); color: #fff; box-shadow: var(--shadow); }
    .topbar .brand { font-weight: 700; font-size: 1rem; white-space: nowrap; }
    .topbar .spacer { flex: 1; }
    .search-box { display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.35); border-radius: 9px; padding: 3px 6px 3px 10px; }
    .search-box input { background: transparent; border: 0; outline: none; color: #fff; width: 190px; font-size: .88rem; }
    .search-box input::placeholder { color: rgba(255,255,255,.75); }
    .search-box #search-count { color: rgba(255,255,255,.9); font-size: .76rem; min-width: 34px; text-align: center; }
    .iconbtn { background: rgba(255,255,255,.16); color: #fff; border: 1px solid rgba(255,255,255,.32);
      border-radius: 7px; padding: 4px 8px; font-size: .82rem; cursor: pointer; transition: background .15s; }
    .iconbtn:hover { background: rgba(255,255,255,.34); }

    /* ---- hero ---- */
    .hero { position: relative; overflow: hidden; color: #fff;
      background: linear-gradient(120deg, var(--hero-1), var(--hero-2) 55%, var(--hero-3)); padding: 34px 26px 30px; }
    .hero::after { content: "♨"; position: absolute; right: 22px; top: 50%; transform: translateY(-50%);
      font-size: 7rem; opacity: .16; line-height: 1; }
    .hero h1 { margin: 0 0 8px; font-size: 1.85rem; border: 0; line-height: 1.2; max-width: 80%; }
    .hero .tagline { margin: 0; opacity: .92; font-size: .96rem; max-width: 80%; }
    .hero .meta { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; }
    .hero .chip { background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.3);
      padding: 3px 11px; border-radius: 999px; font-size: .78rem; }

    /* ---- layout ---- */
    .layout { display: grid; grid-template-columns: 280px minmax(0,1fr); }
    .sidebar { position: sticky; top: var(--topbar-h); align-self: start;
      height: calc(100vh - var(--topbar-h)); overflow-y: auto;
      border-right: 1px solid var(--border); background: var(--panel); padding: 18px 12px; }
    .sidebar .toc-title { font-size: .72rem; text-transform: uppercase; letter-spacing: .12em;
      color: var(--muted); margin: 4px 10px 10px; font-weight: 700; }
    .sidebar nav a { display: block; padding: 6px 10px; margin: 1px 0; border-radius: 7px;
      color: var(--muted); text-decoration: none; font-size: .9rem; line-height: 1.35;
      border-left: 3px solid transparent; transition: background .12s, color .12s; }
    .sidebar nav a:hover { background: var(--accent-soft); color: var(--fg); }
    .sidebar nav a.lvl-3 { padding-left: 24px; font-size: .84rem; }
    .sidebar nav a.active { background: var(--accent-soft); color: var(--accent);
      border-left-color: var(--accent); font-weight: 600; }

    main { min-width: 0; }
    #content { max-width: 940px; margin: 0 auto; padding: 30px 26px 60px; }

    /* ---- typography ---- */
    h1,h2,h3,h4 { line-height: 1.25; scroll-margin-top: calc(var(--topbar-h) + 14px); position: relative; }
    #content h1 { font-size: 1.8rem; margin: .2em 0 .6em; padding-bottom: .35em; border-bottom: 2px solid var(--border); }
    h2 { font-size: 1.42rem; margin-top: 2em; padding-bottom: .3em; border-bottom: 1px solid var(--border); }
    h3 { font-size: 1.16rem; margin-top: 1.6em; color: var(--accent); }
    h4 { font-size: 1.01rem; margin-top: 1.3em; }
    .anchor { position: absolute; left: -.9em; opacity: 0; text-decoration: none; color: var(--accent); }
    h1:hover .anchor, h2:hover .anchor, h3:hover .anchor, h4:hover .anchor { opacity: .55; }
    a { color: var(--accent-2); text-decoration: none; }
    a:hover { text-decoration: underline; }
    p { margin: .7em 0; }
    hr { border: 0; border-top: 1px solid var(--border); margin: 2.2em 0; }
    code { background: var(--code-bg); padding: .12em .42em; border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: .86em; }
    pre { background: var(--code-bg); padding: 14px 16px; border-radius: 10px; overflow: auto; border: 1px solid var(--border); }
    pre code { background: none; padding: 0; }
    blockquote { margin: 1.1em 0; padding: .6em 1.1em; color: var(--muted);
      border-left: 4px solid var(--accent); background: var(--accent-soft); border-radius: 0 8px 8px 0; }
    blockquote p { margin: .3em 0; }

    /* ---- tables ---- */
    .table-wrap { overflow-x: auto; margin: 1.1em 0; border: 1px solid var(--border);
      border-radius: 10px; box-shadow: var(--shadow); background: var(--panel); }
    table { border-collapse: collapse; width: 100%; font-size: .9rem; }
    th, td { padding: 9px 13px; text-align: left; vertical-align: top; border-bottom: 1px solid var(--border); }
    th { background: var(--th-bg); font-weight: 600; position: sticky; top: 0; white-space: nowrap; }
    tbody tr:nth-child(even) { background: var(--zebra); }
    tbody tr:hover { background: var(--accent-soft); }
    td:first-child, th:first-child { padding-left: 16px; }

    /* ---- visual enhancers: swatch / tier / status ---- */
    .swatch { display: inline-block; width: 13px; height: 13px; border-radius: 4px; margin-right: 7px;
      border: 1px solid rgba(0,0,0,.25); vertical-align: -1px; box-shadow: 0 0 0 1px rgba(255,255,255,.4) inset; }
    .tier { display: inline-block; min-width: 30px; text-align: center; font-weight: 700; font-size: .76rem;
      color: #fff; padding: 2px 7px; border-radius: 6px; letter-spacing: .3px; }
    .tier-1{background:#64748b}.tier-2{background:#0ea5e9}.tier-3{background:#14b8a6}.tier-4{background:#8b5cf6}.tier-5{background:#f59e0b}
    .st-done { color: #16a34a; font-weight: 600; }
    .st-todo { color: var(--muted); }
    html[data-theme="dark"] .st-done { color: #4ade80; }

    /* ---- mermaid ---- */
    pre.mermaid { background: transparent; border: 0; text-align: center; cursor: zoom-in; padding: 6px;
      border: 1px dashed var(--border); border-radius: 10px; }
    pre.mermaid svg { max-width: 100%; height: auto; }
    .mm-hint { display: block; text-align: center; color: var(--muted); font-size: .76rem; margin-top: 2px; }

    /* ---- search highlight ---- */
    mark.shit { background: var(--hit); color: inherit; border-radius: 3px; padding: 0 1px; }
    mark.shit.cur { background: var(--hit-cur); box-shadow: 0 0 0 2px var(--hit-cur); }

    /* ---- mermaid fullscreen modal ---- */
    #mm-modal { position: fixed; inset: 0; z-index: 100; display: none; background: rgba(8,14,20,.86); }
    #mm-modal.open { display: flex; flex-direction: column; }
    #mm-bar { display: flex; gap: 8px; align-items: center; padding: 10px 14px; color: #fff; }
    #mm-bar .title { flex: 1; font-size: .9rem; opacity: .85; }
    #mm-bar button { background: rgba(255,255,255,.16); color: #fff; border: 1px solid rgba(255,255,255,.3);
      border-radius: 7px; padding: 5px 11px; cursor: pointer; font-size: .85rem; }
    #mm-bar button:hover { background: rgba(255,255,255,.3); }
    #mm-stage { flex: 1; margin: 0 14px 14px; background: var(--panel); border-radius: 12px; overflow: hidden; }
    #mm-stage svg { width: 100%; height: 100%; }

    .gen-footer { max-width: 940px; margin: 0 auto; padding: 10px 26px 40px;
      color: var(--muted); font-size: .82rem; border-top: 1px dashed var(--border); }

    @media (max-width: 880px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; max-height: 38vh; border-right: 0; border-bottom: 1px solid var(--border); }
      .search-box input { width: 110px; }
      .hero h1, .hero .tagline { max-width: 100%; }
      #content { padding: 22px 16px 50px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <span class="brand">♨ GDD Sheet</span>
    <span class="spacer"></span>
    <div class="search-box">
      <input id="search" type="search" placeholder="Tìm trong tài liệu… (Enter)" autocomplete="off" />
      <span id="search-count"></span>
      <button type="button" class="iconbtn" id="s-prev" title="Kết quả trước (Shift+Enter)">↑</button>
      <button type="button" class="iconbtn" id="s-next" title="Kết quả sau (Enter)">↓</button>
    </div>
    <button type="button" class="iconbtn" id="theme-btn" title="Đổi sáng/tối">🌙</button>
  </header>

  <section class="hero">
    <h1><!--GDD_TITLE--></h1>
    <p class="tagline">Game Design Document · bản sheet 7 mục · grounded từ code</p>
    <div class="meta"><span class="chip">📅 <!--GDD_GENERATED_AT--></span><span class="chip">Self-contained · GitHub Pages</span></div>
  </section>

  <div class="layout">
    <aside class="sidebar">
      <div class="toc-title">Mục lục</div>
      <nav id="toc"></nav>
    </aside>
    <main>
      <article id="content"><p>Đang render…</p></article>
      <footer class="gen-footer">Generated <!--GDD_GENERATED_AT--> · nguồn <code>design/gdd/gdd-sheet/gdd-sheet.md</code> · regenerate bằng <code>/publish-gdd</code></footer>
    </main>
  </div>

  <div id="mm-modal">
    <div id="mm-bar">
      <span class="title">Sơ đồ · kéo để di chuyển · cuộn để zoom</span>
      <button type="button" id="mm-zin">＋</button><button type="button" id="mm-zout">－</button>
      <button type="button" id="mm-reset">Reset</button><button type="button" id="mm-close">✕ Đóng (Esc)</button>
    </div>
    <div id="mm-stage"></div>
  </div>

  <!-- Markdown nguyên văn. type="text/markdown" => browser KHÔNG thực thi, an toàn với < > ${} ` -->
  <script id="md" type="text/markdown"><!--GDD_MARKDOWN--></script>

  <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
  <script>
    (function () {
      "use strict";
      var content = document.getElementById("content");
      function escapeHtml(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
      function escapeAttr(s){ return escapeHtml(s).replace(/"/g,"&quot;"); }
      // GitHub-style slug (KHÔNG gộp space => khớp anchor viết tay trong Mục lục)
      function slugify(t){ return t.toLowerCase().trim().replace(/<[^>]+>/g,"")
        .replace(/[^\p{L}\p{N}\s-]/gu,"").replace(/\s/g,"-"); }

      // ---- markdown -> html ----
      var md = document.getElementById("md").textContent;
      var used = {}, renderer = new marked.Renderer();
      renderer.heading = function (text, level, raw) {
        var id = slugify(raw);
        if (used[id] != null) { used[id]++; id += "-" + used[id]; } else used[id] = 0;
        return "<h"+level+' id="'+id+'"><a class="anchor" href="#'+id+'" aria-hidden="true">#</a>'+text+"</h"+level+">";
      };
      renderer.code = function (code, info) {
        var lang = (info||"").trim().split(/\s+/)[0];
        if (lang === "mermaid") return '<pre class="mermaid" data-src="'+escapeAttr(code)+'">'+escapeHtml(code)+"</pre>";
        return "<pre><code>"+escapeHtml(code)+"</code></pre>";
      };
      renderer.table = function (h, b) { return '<div class="table-wrap"><table><thead>'+h+"</thead><tbody>"+b+"</tbody></table></div>"; };
      marked.setOptions({ renderer: renderer, gfm: true, breaks: false, mangle: false, headerIds: false });
      content.innerHTML = marked.parse(md);

      // ---- visual enhancers ----
      content.querySelectorAll("td, th").forEach(function (cell) {
        var t = cell.textContent.trim();
        var hex = t.match(/^#([0-9a-fA-F]{6})$/);
        if (hex) { cell.insertBefore(makeSwatch("#"+hex[1]), cell.firstChild); return; }
        if (/^T[1-5]$/.test(t)) { cell.innerHTML = '<span class="tier tier-'+t[1]+'">'+t+"</span>"; return; }
        if (cell.tagName === "TD" && /✅/.test(t)) cell.classList.add("st-done");
        else if (cell.tagName === "TD" && /[⬜◻️]/.test(t)) cell.classList.add("st-todo");
      });
      function makeSwatch(c){ var s=document.createElement("span"); s.className="swatch"; s.style.background=c; s.title=c; return s; }

      // ---- TOC + scrollspy ----
      var toc = document.getElementById("toc");
      var heads = content.querySelectorAll("h2, h3");
      heads.forEach(function (h) {
        var a = document.createElement("a"); a.href = "#"+h.id;
        a.textContent = h.textContent.replace(/^#/,"").trim();
        a.className = "lvl-" + (h.tagName === "H3" ? 3 : 2); toc.appendChild(a);
      });
      var links = {}; toc.querySelectorAll("a").forEach(function(a){ links[a.getAttribute("href").slice(1)] = a; });
      var spy = new IntersectionObserver(function (es) {
        es.forEach(function (e) { if (e.isIntersecting) {
          Object.values(links).forEach(function(l){ l.classList.remove("active"); });
          var c = links[e.target.id]; if (c) { c.classList.add("active"); c.scrollIntoView({block:"nearest"}); }
        }});
      }, { rootMargin: "-60px 0px -70% 0px" });
      heads.forEach(function(h){ spy.observe(h); });

      // ---- mermaid render (theme-aware) ----
      function renderMermaid(){
        var dark = document.documentElement.getAttribute("data-theme") === "dark";
        content.querySelectorAll("pre.mermaid").forEach(function (el) {
          el.removeAttribute("data-processed"); el.innerHTML = el.getAttribute("data-src");
        });
        mermaid.initialize({ startOnLoad:false, theme: dark?"dark":"default", securityLevel:"loose" });
        mermaid.run({ querySelector:"pre.mermaid" }).then(function () {
          content.querySelectorAll("pre.mermaid").forEach(function (el) {
            if (!el.querySelector(".mm-hint")) {
              var s = document.createElement("small"); s.className = "mm-hint";
              s.textContent = "⤢ bấm để xem toàn màn · pan & zoom"; el.appendChild(s);
            }
          });
        }).catch(function(e){ console.error("mermaid:", e); });
      }

      // ---- mermaid fullscreen + pan/zoom ----
      var modal = document.getElementById("mm-modal"), stage = document.getElementById("mm-stage"), pz = null;
      content.addEventListener("click", function (ev) {
        var pre = ev.target.closest("pre.mermaid"); if (!pre) return;
        var svg = pre.querySelector("svg"); if (!svg) return;
        var clone = svg.cloneNode(true);
        clone.removeAttribute("id"); clone.removeAttribute("style");
        clone.style.width = "100%"; clone.style.height = "100%"; clone.style.maxWidth = "none";
        stage.innerHTML = ""; stage.appendChild(clone); modal.classList.add("open");
        try { pz = svgPanZoom(clone, { zoomEnabled:true, controlIconsEnabled:false, fit:true, center:true, minZoom:0.3, maxZoom:12 }); } catch(e){ pz=null; }
      });
      function closeModal(){ if (pz){ try{pz.destroy();}catch(e){} pz=null; } modal.classList.remove("open"); stage.innerHTML=""; }
      document.getElementById("mm-close").onclick = closeModal;
      document.getElementById("mm-zin").onclick = function(){ if(pz) pz.zoomBy(1.3); };
      document.getElementById("mm-zout").onclick = function(){ if(pz) pz.zoomBy(0.77); };
      document.getElementById("mm-reset").onclick = function(){ if(pz){ pz.resetZoom(); pz.center(); pz.fit(); } };
      modal.addEventListener("click", function(e){ if (e.target === modal) closeModal(); });
      document.addEventListener("keydown", function(e){ if (e.key === "Escape") closeModal(); });

      // ---- full-text search ----
      var box = document.getElementById("search"), countEl = document.getElementById("search-count");
      var hits = [], idx = -1;
      function unmark(){ content.querySelectorAll("mark.shit").forEach(function(m){ m.replaceWith(document.createTextNode(m.textContent)); }); content.normalize(); }
      function focusHit(){
        hits.forEach(function(m){ m.classList.remove("cur"); });
        if (idx>=0 && hits[idx]){ hits[idx].classList.add("cur"); hits[idx].scrollIntoView({block:"center", behavior:"smooth"}); }
        countEl.textContent = hits.length ? (idx+1)+"/"+hits.length : (box.value ? "0" : "");
      }
      function runSearch(q){
        unmark(); hits = []; idx = -1;
        if (!q){ countEl.textContent = ""; return; }
        var ql = q.toLowerCase();
        var walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT, { acceptNode: function(n){
          if (!n.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
          if (n.parentElement && n.parentElement.closest("pre.mermaid, mark, .anchor")) return NodeFilter.FILTER_REJECT;
          return n.nodeValue.toLowerCase().indexOf(ql) >= 0 ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
        }});
        var nodes = []; while (walker.nextNode()) nodes.push(walker.currentNode);
        nodes.forEach(function(n){ hl(n, ql); });
        hits = Array.prototype.slice.call(content.querySelectorAll("mark.shit"));
        if (hits.length){ idx = 0; }
        focusHit();
      }
      function hl(node, ql){
        var text = node.nodeValue, low = text.toLowerCase(), frag = document.createDocumentFragment(), last = 0, i;
        while ((i = low.indexOf(ql, last)) >= 0){
          if (i > last) frag.appendChild(document.createTextNode(text.slice(last, i)));
          var m = document.createElement("mark"); m.className = "shit"; m.textContent = text.slice(i, i+ql.length); frag.appendChild(m);
          last = i + ql.length;
        }
        if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
        node.replaceWith(frag);
      }
      var deb; box.addEventListener("input", function(){ clearTimeout(deb); deb = setTimeout(function(){ runSearch(box.value.trim()); }, 200); });
      function cycle(d){ if (!hits.length) return; idx = (idx + d + hits.length) % hits.length; focusHit(); }
      box.addEventListener("keydown", function(e){ if (e.key === "Enter"){ e.preventDefault(); cycle(e.shiftKey ? -1 : 1); } });
      document.getElementById("s-next").onclick = function(){ cycle(1); };
      document.getElementById("s-prev").onclick = function(){ cycle(-1); };

      // ---- theme toggle (persist) ----
      var btn = document.getElementById("theme-btn");
      function applyTheme(t){ document.documentElement.setAttribute("data-theme", t); btn.textContent = t === "dark" ? "☀️" : "🌙"; renderMermaid(); }
      var stored = null; try { stored = localStorage.getItem("gdd-theme"); } catch(e){}
      applyTheme(stored || ((window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light"));
      btn.addEventListener("click", function(){
        var next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
        try { localStorage.setItem("gdd-theme", next); } catch(e){}
        applyTheme(next);
      });
    })();
  </script>
</body>
</html>
